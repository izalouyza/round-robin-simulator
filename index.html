<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Simulador Round-Robin</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>

<div class="container">
    <h1>Simulador de Escalonamento Round-Robin</h1>

    <div class="card">
        <h2>Configuração</h2>
        <div class="grid">
            <div>
                <label>Processos</label>
                <input type="number" id="numProcessos" value="4" min="0">
            </div>
            <div>
                <label>Quantum</label>
                <input type="number" id="quantum" value="4" min="0">
            </div>
            <div>
                <label>Tempo Total</label>
                <input type="number" id="tempoTotal" value="50" min="0">
            </div>
            <div>
                <label>Velocidade</label>
                <select id="velocidade">
                    <option value="800">Lento</option>
                    <option value="300" selected>Médio</option>
                    <option value="100">Rápido</option>
                </select>
            </div>
        </div>

        <div class="botoes">
            <button class="sec" onclick="gerarInputs()">Gerar</button>
            <button class="sec" onclick="carregarModelo()">Modelo Aula</button>
            <button class="play" onclick="iniciarSimulacao()">Iniciar</button>
            <button class="pause" onclick="pausar()">Pausar</button>
            <button class="play" onclick="continuar()">Continuar</button>
            <button class="step" onclick="passoManual()">Passo</button>
        </div>
    </div>

    <div class="card">
        <h2>Processos</h2>
        <div id="processos" class="grid-processos"></div>
    </div>

    <div class="card filas">
    <div><b>CPU:</b> <span id="filaCPU"></span></div>
    <div><b>Disco:</b> <span id="filaIO"></span></div>
</div>

    <div class="card">
        <h2>Simulação</h2>
        <div id="tempoAtual">t = 0</div>
        <h3>CPU</h3>
        <div id="cpuTimeline" class="linha"></div>
        <h3>Disco</h3>
        <div id="ioTimeline" class="linha"></div>
    </div>

    <div id="resultados" class="grid-resultados">
    <div class="resultado-card">
        <span id="percCPU" class="res-valor">74.00%</span>
        <span class="res-label">Utilização da CPU</span>
    </div>

    <div class="resultado-card">
        <span id="percDisco" class="res-valor">96.00%</span>
        <span class="res-label">Utilização do Disco</span>
    </div>

    <div class="resultado-card">
        <span id="mediaEspera" class="res-valor">12.00</span>
        <span class="res-label">Espera Média</span>
    </div>

    <div class="resultado-card">
        <span id="mediaTurnaround" class="res-valor">51.00</span>
        <span class="res-label">Turnaround Médio</span>
    </div>

    <div class="resultado-card">
        <span id="mediaResposta" class="res-valor">5.25</span>
        <span class="res-label">Resposta Média</span>
    </div>
</div>

<script src="src/script.js"></script>
</body>
</html>
